<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print Portal</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  text-align: center;
}

.container {
  background: white;
  padding: 20px;
  margin: 50px auto;
  width: 350px;
  border-radius: 10px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
}

button {
  padding: 10px;
  background: #6a0dad;
  color: white;
  border: none;
  cursor: pointer;
}

.preview {
  margin-top: 20px;
  border: 1px dashed #aaa;
  padding: 10px;
}
</style>

</head>

<body>

<div class="container">
<h2>Certificate Portal</h2>

<input type="text" id="name" placeholder="Applicant Name">
<input type="text" id="father" placeholder="Father Name">
<input type="text" id="mobile" placeholder="Mobile">

<button onclick="save()">Save</button>

<div class="preview" id="preview">
No Data
</div>

<button onclick="printPage()">Print</button>

</div>

<script>
function save() {
  let name = document.getElementById("name").value;
  let father = document.getElementById("father").value;
  let mobile = document.getElementById("mobile").value;

  document.getElementById("preview").innerHTML =
    "Name: " + name + "<br>Father: " + father + "<br>Mobile: " + mobile;
}

function printPage() {
  window.print();
}
</script>

</body>
</html>
